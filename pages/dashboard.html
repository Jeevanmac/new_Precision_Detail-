<script>
    function switchSection(sectionId) {
        const contentArea = document.getElementById('dashboard-content');
        const template = document.getElementById('tmpl-' + sectionId);
        if (template) {
            // Reset all regular nav links
            document.querySelectorAll('#sidebar-nav a').forEach(link => {
                link.classList.remove('bg-primary', 'text-white', 'font-medium');
                link.classList.add('text-slate-600', 'dark:text-slate-400', 'hover:bg-slate-100', 'dark:hover:bg-accent-dark');
            });
            
            // Reset bottom profile section
            const profileBottom = document.getElementById('nav-profile-bottom');
            if (profileBottom) {
                profileBottom.classList.remove('bg-primary/10', 'border-primary/20');
                profileBottom.classList.add('hover:bg-slate-100', 'dark:hover:bg-accent-dark');
            }

            const activeLink = document.getElementById('nav-' + sectionId);
            const activeProfileBottom = (sectionId === 'profile') ? profileBottom : null;

            if (activeLink) {
                activeLink.classList.remove('text-slate-600', 'dark:text-slate-400', 'hover:bg-slate-100', 'dark:hover:bg-accent-dark');
                activeLink.classList.add('bg-primary', 'text-white', 'font-medium');
            }

            if (activeProfileBottom) {
                activeProfileBottom.classList.remove('hover:bg-slate-100', 'dark:hover:bg-accent-dark');
                activeProfileBottom.classList.add('bg-primary/10', 'border', 'border-primary/20');
            }

            contentArea.innerHTML = template.innerHTML;
            window.location.hash = sectionId;
            window.scrollTo(0, 0);
        }
    }
    window.addEventListener('DOMContentLoaded', () => {
        const hash = window.location.hash.replace('#', '');
        switchSection(hash && document.getElementById('tmpl-' + hash) ? hash : 'overview');
    });
    window.addEventListener('hashchange', () => {
        const hash = window.location.hash.replace('#', '');
        if (hash && document.getElementById('tmpl-' + hash)) switchSection(hash);
    });
</script>
